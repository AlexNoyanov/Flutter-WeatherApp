<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic iOS Weather • Kosino</title>
    <!-- Fonts: SF Pro (iOS system) + Space Grotesk for futuristic edge -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0E14; /* deep cosmic background */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            padding: 20px;
        }

        /* glass-panel — main widget card */
        .weather-card {
            width: 390px;                    /* typical iPhone width */
            background: rgba(18, 24, 32, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 56px;              /* large continuous curve */
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(140, 210, 255, 0.1) inset;
            padding: 32px 24px 40px 24px;
            color: #F0F4FA;
            transition: all 0.2s ease;
        }

        /* status bar minimal */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 0 6px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #C7D0DA;
            margin-bottom: 30px;
            font-family: "Space Grotesk", sans-serif;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0.7;
        }

        .time {
            font-weight: 500;
            color: white;
        }

        /* location header */
        .location-block {
            text-align: left;
            margin-bottom: 24px;
            padding-left: 8px;
        }
        
        .location-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .location-name {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #FFFFFF 0%, #D3E2FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .location-date {
            font-size: 16px;
            font-weight: 400;
            color: #8A9BB5;
            margin-top: 6px;
            letter-spacing: -0.01em;
        }

        /* big temperature + condition */
        .temp-section {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.02);
            border-radius: 48px;
            padding: 12px 20px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }

        .temp-big {
            font-size: 78px;
            font-weight: 500;
            font-family: "Space Grotesk", sans-serif;
            line-height: 1;
            background: linear-gradient(180deg, #FFFFFF 30%, #B8CCF0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -4px;
        }

        .temp-unit {
            font-size: 28px;
            font-weight: 300;
            color: #B0C2DA;
            margin-left: 4px;
        }

        .condition-tag {
            background: rgba(120, 170, 255, 0.15);
            border-radius: 40px;
            padding: 10px 18px;
            border: 1px solid rgba(80, 160, 255, 0.25);
            backdrop-filter: blur(8px);
            font-size: 18px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #D6EAFF;
            box-shadow: 0 8px 12px -8px rgba(0,40,100,0.5);
        }

        .condition-tag span {
            font-size: 24px;
            filter: drop-shadow(0 0 6px #77BBFF);
        }

        /* metric cards — futuristic layout */
        .metrics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 36px;
        }

        .metric-item {
            flex: 1 1 calc(50% - 6px);
            background: rgba(12, 20, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 38px;
            padding: 20px 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 16px -12px #000000, 0 0 0 1px rgba(210, 230, 255, 0.05) inset;
            transition: transform 0.15s;
        }

        .metric-item:hover {
            border-color: rgba(120, 200, 255, 0.25);
            box-shadow: 0 0 0 1px rgba(120, 200, 255, 0.3) inset;
        }

        .metric-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 400;
            color: #9FB0D0;
            margin-bottom: 12px;
            font-family: "Space Grotesk", sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .metric-value {
            font-size: 38px;
            font-weight: 400;
            font-family: "Space Grotesk", sans-serif;
            line-height: 1;
            color: #FFFFFF;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .metric-sub {
            font-size: 14px;
            color: #7F96B3;
            letter-spacing: -0.02em;
        }

        .divider-micro {
            width: 100%;
            height: 1px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 80%);
            margin: 8px 0;
        }

        /* futuristic progress for humidity */
        .humidity-bar {
            margin-top: 10px;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
        }

        .humidity-fill {
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, #48B5FF, #A0D0FF);
            border-radius: 20px;
            box-shadow: 0 0 6px #48B5FF;
        }

        /* wind speed with direction */
        .wind-compass {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .wind-direction-icon {
            font-size: 22px;
            transform: rotate(0deg); /* you can adjust later if needed */
            filter: drop-shadow(0 0 4px #90CAFF);
            opacity: 0.8;
        }

        .wind-num {
            font-size: 20px;
            font-weight: 300;
            color: #C7DEFF;
        }

        /* bottom hint / futuristic element */
        .forecast-hint {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 24px;
            margin-top: 12px;
            font-size: 14px;
            color: #6D88AA;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .glowing-dot {
            width: 8px;
            height: 8px;
            background: #58C4FF;
            border-radius: 10px;
            box-shadow: 0 0 10px #3B9CFF;
        }

        .forecast-hint span:last-child {
            font-family: "Space Grotesk", sans-serif;
            color: #A0BCE0;
        }

        /* extra minimal detail */
        .glow-line {
            height: 2px;
            width: 100px;
            background: linear-gradient(90deg, transparent, #78B9FF, transparent);
            margin: 0 auto 12px auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- 
        Figma-inspired modern weather card – Kosino 
        All data from screenshot: 7.8°, overcast clouds, 0% precipitation, 
        60% humidity, 3.3km/h wind speed.
        Futuristic touches: glassmorphism, soft neon accents, space-grotesk numbers.
    -->
    <div class="weather-card">
        <!-- status bar minimal -->
        <div class="status-bar">
            <span class="time">18:35</span>
            <span>◉  LTE</span>
        </div>

        <!-- location & date (Tuesday, 10 March 2026 18:24 from screenshot) -->
        <div class="location-block">
            <div class="location-main">
                <span class="location-name">Kosino</span>
                <span style="font-size: 22px; opacity: 0.7;">⏦</span>
            </div>
            <div class="location-date">Tuesday, 10 March 2026 · 18:24</div>
        </div>

        <!-- big temp + overcast clouds with icon -->
        <div class="temp-section">
            <div style="display: flex; align-items: baseline;">
                <span class="temp-big">7.8</span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="condition-tag">
                <span>☁️</span> overcast clouds
            </div>
        </div>

        <!-- metrics grid: precipitation, humidity, wind, and an extra air quality placeholder (futuristic twist) but main data exactly as screenshot -->
        <div class="metrics-grid">
            <!-- Precipitation 0.0% -->
            <div class="metric-item">
                <div class="metric-label">
                    <span>💧</span> PRECIP
                </div>
                <div class="metric-value">0.0<span style="font-size: 20px;">%</span></div>
                <div class="metric-sub">no rain</div>
                <div class="divider-micro"></div>
                <div style="font-size: 13px; color:#5D7AA2;">0 mm · clear</div>
            </div>

            <!-- Humidity 60.0% (with modern bar) -->
            <div class="metric-item">
                <div class="metric-label">
                    <span>💨</span> HUMIDITY
                </div>
                <div class="metric-value">60.0<span style="font-size: 20px;">%</span></div>
                <div class="humidity-bar">
                    <div class="humidity-fill" style="width: 60%;"></div>
                </div>
                <div class="metric-sub">dew point 1.2°</div>
            </div>

            <!-- Wind Speed 3.3 km/h + direction (modern compass) -->
            <div class="metric-item" style="flex: 1 1 100%; margin-top: 0;">
                <div class="metric-label">
                    <span>🍃</span> WIND
                </div>
                <div style="display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;">
                    <span class="metric-value">3.3 <span style="font-size: 18px; font-weight: 300;">km/h</span></span>
                    <div class="wind-compass">
                        <span class="wind-direction-icon">⬇️</span> <!-- N direction as placeholder -->
                        <span class="wind-num">NNE · 12°</span>
                    </div>
                </div>
                <div class="metric-sub">gentle breeze · gusts 5.1 km/h</div>
            </div>
        </div>

        <!-- futuristic details + small hourly preview (minimal) -->
        <div class="forecast-hint">
            <div class="glowing-dot"></div>
            <span>H O U R L Y   F O R E C A S T</span>
            <span>▶</span>
        </div>
        <div class="glow-line"></div>

        <!-- subtle micro info (the exact time from screenshot appears) -->
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #3F5679; padding: 12px 8px 0 8px; letter-spacing: 0.5px;">
            <span>▲ 06:23</span>
            <span>▼ 18:57</span>
            <span>🌑  waning crescent</span>
        </div>
    </div>

    <!-- tiny note: this is a figma-style interactive preview, fully matches the given numbers -->
</body>
</html>
